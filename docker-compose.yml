version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: returnshield_db
    environment:
      POSTGRES_USER: returnshield
      POSTGRES_PASSWORD: returnshield_pass
      POSTGRES_DB: returnshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U returnshield"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
